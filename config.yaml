# Configuration for BrainAlign-style pipeline

data:
  # EEG2 uses its own stimuli directory
  eeg_dir: "data/things-eeg2"
  eeg_stimuli_dir: "data/things-eeg2/stimuli"
  manifests_dir: "data/manifests"
  things_image_map_path: "data/things_image_map.tsv"
  things_image_root: "osfstorage-archive/images_THINGS/object_images"

  # MEG and fMRI point to BIDS derivatives/sourcedata
  meg_dir: "data/things-meg-ds004212"
  fmri_dir: "data/things-fmri-ds004192"

  # Directory to store the CLIP features cache
  clip_cache_dir: "clip_cache"

model:
  clip_name: "ViT-B/32"
  brain_encoder: "CBraMod"
  projection_dim: 512
  meg_hidden_dim: 256
  meg_dropout: 0.2
  temperature_init: 0.07 # standard CLIP value

training:
  batch_size:
    eeg: 32
    meg: 32
    fmri: 256
  selection_metric:
    eeg: top1
    meg: mrr
    fmri: mrr
  learning_rate: 3e-4
  epochs:
    eeg: 35
    meg: 60
    fmri: 60
